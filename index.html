<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>App Dò Xổ Số Pro</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            text-align: center;
            padding: 30px;
        }
        .box {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            max-width: 350px;
            margin: auto;
        }
        h1 {
            color: #e60000;
        }
        select, input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
        }
        button {
            width: 95%;
            padding: 12px;
            background: #e60000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
        }
        button:hover {
            background: #cc0000;
        }
        #result {
            margin-top: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>App Dò Xổ Số 🎯</h1>

    <select id="mien">
        <option value="bac">Miền Bắc</option>
        <option value="trung">Miền Trung</option>
        <option value="nam">Miền Nam</option>
    </select>

    <input type="text" id="numberInput" placeholder="Nhập số cần dò">
    <input type="number" id="moneyInput" placeholder="Nhập tiền đánh">

    <button onclick="checkNumber()">Dò & Tính Tiền</button>

    <p id="result"></p>
</div>

<script>
    // Giả lập kết quả từng miền
    let ketQua = {
        bac: ["27", "72", "544", "85"],
        trung: ["12", "34", "56", "78"],
        nam: ["39", "88", "19", "64"]
    };

    function checkNumber() {
        let mien = document.getElementById("mien").value;
        let soNhap = document.getElementById("numberInput").value;
        let tien = parseInt(document.getElementById("moneyInput").value);
        let result = document.getElementById("result");

        if (!soNhap || !tien) {
            result.innerHTML = "⚠️ Nhập đầy đủ số và tiền đi ní!";
            return;
        }

        if (ketQua[mien].includes(soNhap)) {
            let tienTrung = tien * 70; // giả lập ăn 70 lần
            result.innerHTML = "🎉 Trúng rồi ní! Ăn được: " + tienTrung.toLocaleString() + " đ";
        } else {
            result.innerHTML = "❌ Không trúng rồi! Mất: " + tien.toLocaleString() + " đ";
        }
    }
</script>

</body>
</html>
