<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>App Dò Xổ Số PRO MAX</title>
<style>
body{
    font-family: Arial;
    background: linear-gradient(135deg,#ff416c,#ff4b2b);
    display:flex;
    justify-content:center;
    padding:40px 10px;
}
.card{
    background:white;
    padding:20px;
    border-radius:20px;
    width:100%;
    max-width:400px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}
h2{text-align:center;color:#ff416c}
select,input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:10px;
    border:1px solid #ddd;
    font-size:16px;
}
button{
    background:#ff416c;
    color:white;
    border:none;
    font-weight:bold;
}
.result{
    margin-top:15px;
    padding:10px;
    border-radius:10px;
    background:#f3f3f3;
}
.win{color:green;font-weight:bold}
.lose{color:red;font-weight:bold}
</style>
</head>
<body>

<div class="card">
<h2>🎯 App Dò Xổ Số PRO MAX</h2>

<select id="mien">
<option value="mien-bac">Miền Bắc</option>
<option value="mien-nam">Miền Nam</option>
<option value="mien-trung">Miền Trung</option>
</select>

<input id="input" placeholder="Nhập dạng: 38-10000,27-500">

<button onclick="doSo()">Dò & Tính Tiền</button>

<div class="result" id="result"></div>
</div>

<script>
async function doSo(){
    const mien = document.getElementById("mien").value;
    const input = document.getElementById("input").value;
    const box = document.getElementById("result");
    box.innerHTML="Đang lấy kết quả...";

    try{
        const res = await fetch("https://api.xosoapi.com/v1/"+mien);
        const json = await res.json();

        if(!json || !json.data){
            box.innerHTML="Không lấy được kết quả.";
            return;
        }

        const allNumbers = Object.values(json.data).flat().join("-");
        let tong = 0;
        let html="";

        input.split(",").forEach(item=>{
            let parts=item.trim().split("-");
            if(parts.length!=2) return;

            let so=parts[0];
            let tien=parseInt(parts[1]);

            let count=(allNumbers.match(new RegExp(so,"g"))||[]).length;
            let trung=count>0;

            let tienTrung=count*tien*70;
            tong+=tienTrung;

            html+=`
            <p>
            ${so} - ${tien.toLocaleString()}đ :
            ${trung ? `<span class="win">Trúng ${count} lần = ${tienTrung.toLocaleString()}đ</span>`
            : `<span class="lose">Không trúng</span>`}
            </p>
            `;
        });

        html+=`<hr><strong>Tổng thắng: ${tong.toLocaleString()}đ</strong>`;
        box.innerHTML=html;

    }catch(e){
        box.innerHTML="Không lấy được kết quả.";
    }
}
</script>

</body>
</html>
